<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: 100%; max-width: 420px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h1 { font-size: 1.4rem; }
    a.logout { font-size: .875rem; color: #6b7280; text-decoration: none; }
    a.logout:hover { color: #111; }
    p { color: #374151; font-size: .95rem; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Welcome, {{ user }}</h1>
      <a class="logout" href="/logout">Logout</a>
    </header>
    <p>You are logged in. Navigate to a user's upload page at <code>/users/&lt;id&gt;/upload</code>.</p>
  </div>
</body>
</html>
