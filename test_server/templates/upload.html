<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Document — User {{ user_id }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: 100%; max-width: 420px; }
    header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; }
    h1 { font-size: 1.4rem; }
    .meta { font-size: .8rem; color: #6b7280; margin-top: .2rem; }
    a.logout { font-size: .875rem; color: #6b7280; text-decoration: none; }
    a.logout:hover { color: #111; }
    .field { margin-bottom: 1rem; }
    label.file-label { display: block; margin-bottom: .4rem; font-size: .875rem; color: #444; }
    .file-row { display: flex; gap: .5rem; align-items: center; }
    input[type="file"] { flex: 1; font-size: .9rem; }
    #file-name { font-size: .85rem; color: #6b7280; margin-top: .35rem; min-height: 1.2rem; }
    button[type="submit"] { width: 100%; padding: .7rem; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: .5rem; }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div>
        <h1>Upload Document</h1>
        <p class="meta">User ID: <strong>{{ user_id }}</strong> &nbsp;|&nbsp; {{ user }}</p>
      </div>
      <a class="logout" href="/logout">Logout</a>
    </header>

    <form method="POST" enctype="multipart/form-data">
      <div class="field">
        <label class="file-label" for="file-input">Select a file</label>
        <input type="file" id="file-input" name="file" />
      </div>
      <button type="submit" id="submit-btn">Upload</button>
    </form>
  </div>
</body>
</html>
