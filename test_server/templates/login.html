<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); width: 100%; max-width: 360px; }
    h1 { margin-bottom: 1.5rem; font-size: 1.4rem; }
    label { display: block; margin-bottom: .25rem; font-size: .875rem; color: #444; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; padding: .7rem; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { color: #dc2626; font-size: .875rem; margin-bottom: 1rem; background: #fee2e2; padding: .5rem .75rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" />
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
